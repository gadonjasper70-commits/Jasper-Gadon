<!DOCTYPE html>
<html lang="tl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Z-Score Attack: Battle of the Normal Curve</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@500;600&display=swap');

  :root{
    --bg: #0a0f1c;
    --panel: #121a2b;
    --panel-2: #17203a;
    --line: #263252;
    --blue: #4c8dff;
    --green: #34d399;
    --amber: #fbbf24;
    --red: #f87171;
    --text: #e7ecf5;
    --muted: #8593ac;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background: radial-gradient(1200px 600px at 50% -10%, #14203f 0%, var(--bg) 60%);
    color:var(--text);
    font-family:'Inter',sans-serif;
    min-height:100vh;
    padding:20px 14px 60px;
  }
  h1,h2,h3{font-family:'Space Grotesk',sans-serif; margin:0;}
  .wrap{max-width:920px; margin:0 auto;}

  /* HEADER */
  .header{text-align:center; margin-bottom:18px;}
  .eyebrow{
    font-family:'IBM Plex Mono',monospace; font-size:12px; letter-spacing:.14em;
    color:var(--blue); text-transform:uppercase; margin-bottom:6px;
  }
  .title{font-size:26px; font-weight:700;}
  .subtitle{color:var(--muted); font-size:13px; margin-top:4px;}

  .curve-wrap{margin:14px auto 4px; max-width:520px;}

  /* LAB PANELS */
  .lab{
    background:linear-gradient(180deg,var(--panel),var(--panel-2));
    border:1px solid var(--line); border-radius:14px; padding:14px 16px; margin-bottom:12px;
  }
  .lab-head{display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;}
  .lab-name{font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:15px;}
  .lab-name.ai{color:var(--red);}
  .lab-name.you{color:var(--green);}
  .kp{font-family:'IBM Plex Mono',monospace; font-size:12px; color:var(--amber);}

  .parts{display:grid; grid-template-columns:repeat(5,1fr); gap:8px;}
  .part{
    background:#0d1424; border:1px solid var(--line); border-radius:10px;
    padding:8px 4px; text-align:center; position:relative; transition:.2s;
    cursor:default;
  }
  .part.targetable{cursor:pointer; border-color:var(--blue);}
  .part.targetable:hover{background:#152040; transform:translateY(-2px);}
  .part.destroyed{opacity:.3; filter:grayscale(1);}
  .part .icon{font-size:20px; display:block; margin-bottom:4px;}
  .part .pname{font-size:9px; color:var(--muted); line-height:1.2; min-height:22px;}
  .hp-dots{display:flex; justify-content:center; gap:3px; margin-top:5px;}
  .hp-dot{width:6px; height:6px; border-radius:50%; background:var(--line);}
  .hp-dot.filled{background:var(--green);}
  .lab-name.ai ~ .parts .hp-dot.filled{background:var(--red);}

  /* LOG / STATUS */
  .status{
    text-align:center; font-family:'IBM Plex Mono',monospace; font-size:12.5px;
    color:var(--muted); min-height:20px; margin:10px 0;
  }

  /* ACTIONS */
  .actions{display:flex; gap:10px; justify-content:center; flex-wrap:wrap; margin:14px 0;}
  button{
    font-family:'Inter',sans-serif; font-weight:600; font-size:13.5px;
    border:none; border-radius:9px; padding:11px 18px; cursor:pointer;
    transition:.15s; color:#08101f;
  }
  button:disabled{opacity:.35; cursor:not-allowed;}
  .btn-attack{background:var(--blue); color:#fff;}
  .btn-attack:hover:not(:disabled){background:#6ba0ff;}
  .btn-defend{background:var(--green);}
  .btn-defend:hover:not(:disabled){background:#5eeab0;}
  .btn-repair{background:var(--amber);}
  .btn-repair:hover:not(:disabled){background:#ffd061;}
  .btn-ghost{background:transparent; border:1px solid var(--line); color:var(--text);}
  .btn-ghost:hover{border-color:var(--blue);}

  /* CHALLENGE MODAL */
  .overlay{
    position:fixed; inset:0; background:rgba(4,7,15,.78); backdrop-filter:blur(3px);
    display:none; align-items:center; justify-content:center; z-index:50; padding:16px;
  }
  .overlay.show{display:flex;}
  .card{
    background:linear-gradient(180deg,#161f38,#0f1626);
    border:1px solid var(--line); border-radius:16px; max-width:480px; width:100%;
    padding:22px 22px 20px; box-shadow:0 20px 60px rgba(0,0,0,.5);
  }
  .card-tag{
    display:inline-block; font-family:'IBM Plex Mono',monospace; font-size:10.5px;
    letter-spacing:.1em; padding:3px 9px; border-radius:20px; margin-bottom:10px;
  }
  .tag-A{background:rgba(76,141,255,.15); color:var(--blue); border:1px solid rgba(76,141,255,.4);}
  .tag-B{background:rgba(52,211,153,.15); color:var(--green); border:1px solid rgba(52,211,153,.4);}
  .card-q{font-size:15.5px; line-height:1.5; margin-bottom:14px;}
  .card-q .formula{
    display:block; font-family:'IBM Plex Mono',monospace; background:#0a1120;
    border:1px solid var(--line); border-radius:8px; padding:8px 10px; margin-top:8px; font-size:13.5px; color:var(--amber);
  }
  .opts{display:flex; flex-direction:column; gap:8px; margin-bottom:6px;}
  .opt{
    text-align:left; background:#0d1424; border:1px solid var(--line); color:var(--text);
    padding:10px 12px; border-radius:9px; font-family:'IBM Plex Mono',monospace; font-size:13.5px;
  }
  .opt:hover:not(:disabled){border-color:var(--blue); background:#132043;}
  .opt.correct{border-color:var(--green); background:rgba(52,211,153,.12); color:var(--green);}
  .opt.wrong{border-color:var(--red); background:rgba(248,113,113,.12); color:var(--red);}

  .feedback{margin-top:12px; padding:12px; border-radius:10px; background:#0a1120; border:1px solid var(--line); font-size:13px; color:var(--muted); display:none;}
  .feedback.show{display:block;}
  .feedback b{color:var(--text);}
  .feedback .fb-title{font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:14px; display:block; margin-bottom:5px;}
  .fb-title.ok{color:var(--green);}
  .fb-title.no{color:var(--red);}
  .continue-btn{margin-top:12px; width:100%; background:var(--blue); color:#fff; padding:11px;}

  /* GAME OVER */
  .gameover{
    position:fixed; inset:0; background:rgba(4,7,15,.9); display:none;
    align-items:center; justify-content:center; z-index:60; text-align:center; padding:20px;
  }
  .gameover.show{display:flex;}
  .go-title{font-size:30px; margin-bottom:8px;}
  .go-sub{color:var(--muted); margin-bottom:18px;}

  @media (max-width:520px){
    .parts{grid-template-columns:repeat(5,1fr);}
    .part .pname{font-size:7.5px;}
    .title{font-size:21px;}
  }
</style>
</head>
<body>
<div class="wrap">

  <div class="header">
    <div class="eyebrow">Educational Strategy Card Game</div>
    <div class="title">🔔 Z-SCORE ATTACK</div>
    <div class="subtitle">Battle of the Normal Curve — Ipagtanggol ang iyong Lab, sirain ang kay AI!</div>
  </div>

  <div class="curve-wrap">
    <svg id="curveViz" viewBox="0 0 520 90" width="100%" height="90"></svg>
  </div>

  <!-- AI LAB -->
  <div class="lab">
    <div class="lab-head">
      <div class="lab-name ai">🤖 AI Data Corruption Lab</div>
      <div class="kp">KP: <span id="aiKP">0</span></div>
    </div>
    <div class="parts" id="aiParts"></div>
  </div>

  <div class="status" id="statusLine">Ikaw ang unang gagalaw. Piliin ang aksyon mo sa ibaba.</div>

  <!-- PLAYER LAB -->
  <div class="lab">
    <div class="lab-head">
      <div class="lab-name you">🧑‍🔬 Your Statistics Lab</div>
      <div class="kp">KP: <span id="playerKP">0</span></div>
    </div>
    <div class="parts" id="playerParts"></div>
  </div>

  <div class="actions" id="mainActions">
    <button class="btn-attack" id="btnAttack">⚔️ Attack (piliin ang target)</button>
    <button class="btn-defend" id="btnStudy">📖 Study Round (+prep, walang attack)</button>
    <button class="btn-ghost" id="btnHowTo">❓ Paano Laruin</button>
  </div>

</div>

<!-- CHALLENGE OVERLAY -->
<div class="overlay" id="overlay">
  <div class="card">
    <span class="card-tag" id="cardTag">TYPE A</span>
    <div class="card-q" id="cardQ"></div>
    <div class="opts" id="cardOpts"></div>
    <div class="feedback" id="feedback">
      <span class="fb-title" id="fbTitle"></span>
      <span id="fbBody"></span>
    </div>
    <button class="continue-btn" id="continueBtn" style="display:none;">Ituloy →</button>
  </div>
</div>

<!-- GAME OVER -->
<div class="gameover" id="gameover">
  <div>
    <div class="go-title" id="goTitle">🎉 PANALO!</div>
    <div class="go-sub" id="goSub">Nasira mo lahat ng AI lab parts.</div>
    <button class="btn-attack" onclick="location.reload()">🔄 Maglaro Ulit</button>
  </div>
</div>

<script>
/* ---------------- DATA ---------------- */
const PART_DEFS = [
  {key:'curve', icon:'🔔', name:'Bell Curve'},
  {key:'mean', icon:'📍', name:'Mean (μ)'},
  {key:'sd', icon:'📏', name:'Std. Dev (σ)'},
  {key:'sym', icon:'⚖️', name:'Symmetry'},
  {key:'zconv', icon:'🎯', name:'Z-Converter'},
];
const HP_MAX = 2;

// TYPE A — Illustrate a normal random variable & characteristics
const TYPE_A = [
  {
    q:"Sa isang perpektong normal distribution, ano ang relasyon ng mean, median, at mode?",
    opts:["Magkakapantay silang tatlo","Ang mean ay laging pinakamataas","Ang mode ay laging nasa gilid","Walang fixed na relasyon"],
    correct:0,
    exp:"Sa normal distribution, ang mean, median, at mode ay nasa gitna at magkakapantay dahil symmetric ang curve."
  },
  {
    q:"Alin sa mga sumusunod ang TAMANG hugis ng normal distribution?",
    opts:["Skewed to the right","Skewed to the left","Symmetric, bell-shaped","Uniform / patag"],
    correct:2,
    exp:"Ang normal distribution ay symmetric at bell-shaped — magkatulad ang dalawang kalahati sa magkabilang gilid ng mean."
  },
  {
    q:"Ayon sa Empirical Rule (68-95-99.7), ilang porsyento ng data ang nasa loob ng ±1 standard deviation mula sa mean?",
    opts:["50%","68%","95%","99.7%"],
    correct:1,
    exp:"Ang 68% ng data ay nasa loob ng ±1σ mula sa mean — ito ang unang bahagi ng Empirical Rule."
  },
  {
    q:"Ilang porsyento ng data ang sakop ng ±2 standard deviations mula sa mean?",
    opts:["68%","75%","95%","99.7%"],
    correct:2,
    exp:"Ayon sa Empirical Rule, 95% ng data ang nasa loob ng ±2σ mula sa mean."
  },
  {
    q:"Ang total area sa ilalim ng normal curve ay katumbas ng:",
    opts:["0","0.5","1","Depende sa σ"],
    correct:2,
    exp:"Ang buong area sa ilalim ng anumang normal curve ay palaging katumbas ng 1 (o 100%) — ito ang kabuuang probability."
  },
  {
    q:"Kung mas malaki ang standard deviation ng isang normal distribution, ano ang mangyayari sa hugis ng curve?",
    opts:["Mas matangkad at makitid","Mas mababa at mas kalat (flat/wide)","Mababago ang mean","Mawawala ang symmetry"],
    correct:1,
    exp:"Mas malaking σ = mas kalat ang data, kaya mas flat at mas malapad ang curve. Mas maliit na σ = mas makitid at matangkad."
  },
  {
    q:"Ang mean ng isang normal curve ang tumutukoy sa:",
    opts:["Lapad ng curve","Gitna/center ng distribution","Bilang ng outliers","Skewness"],
    correct:1,
    exp:"Ang mean ang siyang center o balanse ng buong distribution — kung saan naka-align ang peak ng curve."
  },
  {
    q:"Alin ang HINDI katangian ng normal random variable?",
    opts:["Symmetric sa mean","May dalawang peaks (bimodal)","Continuous ang values","Ang curve ay hindi kailanman gumagalaw pababa sa x-axis"],
    correct:1,
    exp:"Ang normal distribution ay unimodal — iisa lang ang peak nito, hindi bimodal."
  },
  {
    q:"Sa normal curve, ang mga 'tails' (dulo) nito ay:",
    opts:["Umaabot sa infinity pero hindi kailanman humihipo sa x-axis","Direktang humihinto sa isang fixed point","Palaging pantay ang taas sa peak","Wala sa larawan ng normal curve"],
    correct:0,
    exp:"Ang mga tails ng normal curve ay 'asymptotic' — papalapit sila sa x-axis pero hindi ito hinihipo, hanggang infinity."
  },
  {
    q:"Kapag inilarawan mo ang isang normal random variable gamit ang graph, ano ang dalawang parameter na kailangan mong tukuyin?",
    opts:["Minimum at maximum","Mean at standard deviation","Median at range","Mode at frequency"],
    correct:1,
    exp:"Ang normal distribution ay ganap na natutukoy gamit lang ang dalawang parameter: ang mean (μ) at standard deviation (σ)."
  },
];

// TYPE B — Convert a normal random variable to a z-score
function zProblem(mu, sigma, x){
  const z = (x - mu) / sigma;
  return {mu, sigma, x, z: Math.round(z*100)/100};
}
const rawB = [
  zProblem(80,10,95),
  zProblem(50,5,60),
  zProblem(100,15,130),
  zProblem(70,8,62),
  zProblem(60,12,60),
  zProblem(45,9,27),
  zProblem(90,6,84),
  zProblem(120,20,140),
  zProblem(35,7,49),
  zProblem(65,10,50),
];
const TYPE_B = rawB.map(p=>{
  const correctVal = p.z;
  // generate 3 distractors close to correct
  const distractSet = new Set([correctVal]);
  while(distractSet.size < 4){
    const delta = (Math.random()>0.5?1:-1) * (Math.round((Math.random()*1.5+0.3)*10)/10);
    let d = Math.round((correctVal + delta)*100)/100;
    if(d !== correctVal) distractSet.add(d);
  }
  const opts = Array.from(distractSet).sort(()=>Math.random()-0.5);
  return {
    q:`Hanapin ang z-score. Mean (μ) = ${p.mu}, Standard Deviation (σ) = ${p.sigma}, Score (x) = ${p.x}.`,
    formula:`z = (x − μ) / σ = (${p.x} − ${p.mu}) / ${p.sigma} = ${correctVal}`,
    opts: opts.map(o=>o.toFixed(2)),
    correct: opts.indexOf(correctVal),
    exp:`Gamit ang formula na z = (x − μ) / σ: z = (${p.x} − ${p.mu}) / ${p.sigma} = ${correctVal}. ${correctVal>0?"Positibong z-score ibig sabihin nasa itaas ng mean ang score.":correctVal<0?"Negatibong z-score ibig sabihin nasa ibaba ng mean ang score.":"Zero z-score ibig sabihin eksaktong katumbas ng mean ang score."}`
  };
});

/* ---------------- STATE ---------------- */
let state = {
  player: PART_DEFS.map(p=>({...p, hp:HP_MAX})),
  ai: PART_DEFS.map(p=>({...p, hp:HP_MAX})),
  playerKP:0, aiKP:0,
  usedA:[], usedB:[],
  targetKey:null,
  mode:null, // 'attack' | 'defend'
  ended:false
};

/* ---------------- RENDER ---------------- */
function renderParts(containerId, arr, targetable){
  const el = document.getElementById(containerId);
  el.innerHTML = '';
  arr.forEach(p=>{
    const div = document.createElement('div');
    div.className = 'part' + (p.hp<=0?' destroyed':'') + (targetable && p.hp>0 ? ' targetable':'');
    div.innerHTML = `
      <span class="icon">${p.icon}</span>
      <div class="pname">${p.name}</div>
      <div class="hp-dots">${Array.from({length:HP_MAX}).map((_,i)=>`<span class="hp-dot ${i<p.hp?'filled':''}"></span>`).join('')}</div>
    `;
    if(targetable && p.hp>0){
      div.onclick = ()=> startAttack(p.key);
    }
    el.appendChild(div);
  });
}

function renderAll(targetableAI=false){
  renderParts('aiParts', state.ai, targetableAI);
  renderParts('playerParts', state.player, false);
  document.getElementById('playerKP').textContent = state.playerKP;
  document.getElementById('aiKP').textContent = state.aiKP;
  drawCurve();
}

function setStatus(msg){
  document.getElementById('statusLine').textContent = msg;
}

function drawCurve(){
  const totalPlayer = state.player.reduce((s,p)=>s+p.hp,0);
  const totalAI = state.ai.reduce((s,p)=>s+p.hp,0);
  const maxTotal = PART_DEFS.length*HP_MAX;
  const health = (totalPlayer+totalAI)/(maxTotal*2); // 0..1
  const sigma = 40 + (1-health)*60; // wider curve as health drops (more corrupted)
  const svg = document.getElementById('curveViz');
  const w=520,h=90,mid=w/2,base=80;
  let path = `M0,${base} `;
  for(let x=0;x<=w;x+=4){
    const dx = x-mid;
    const y = base - 60*Math.exp(-(dx*dx)/(2*sigma*sigma));
    path += `L${x},${y.toFixed(1)} `;
  }
  const color = health>0.6?'#34d399':health>0.3?'#fbbf24':'#f87171';
  svg.innerHTML = `
    <path d="${path}" fill="none" stroke="${color}" stroke-width="2.5" opacity="0.9"/>
    <line x1="0" y1="${base}" x2="${w}" y2="${base}" stroke="#263252" stroke-width="1"/>
  `;
}

/* ---------------- HOW TO ---------------- */
document.getElementById('btnHowTo').onclick = ()=>{
  alert(
"PAANO LARUIN:\n\n"+
"1. Pindutin ang 'Attack' pagkatapos ay piliin kung aling AI lab part ang tatamaan mo.\n"+
"2. Sasagutan mo ang isang Challenge Card (Illustrate o Z-Score Conversion). Tama = tatamaan mo ang part. Mali = mabibigo ang atake.\n"+
"3. Pagkatapos ng turn mo, sasalakay din ang AI sa isa mong part — sasagutan mo rin ang tanong para depensahan ito.\n"+
"4. Ang 'Study Round' ay nag-sskip ng attack para lang makakuha ng 1 Knowledge Point kapag tama ang sagot mo — walang risk.\n"+
"5. Panalo: sirain lahat ng 5 parts ng kalaban, O maunang makarating sa 10 Knowledge Points."
  );
};

/* ---------------- ATTACK FLOW ---------------- */
document.getElementById('btnAttack').onclick = ()=>{
  setStatus("Piliin ang Lab Part ng AI na gusto mong atakehin.");
  renderAll(true);
};

document.getElementById('btnStudy').onclick = ()=>{
  state.mode = 'study';
  askChallenge();
};

function startAttack(key){
  state.targetKey = key;
  state.mode = 'attack';
  renderAll(false);
  askChallenge();
}

function pickQuestion(){
  // alternate type A / type B, avoid repeats until exhausted
  const useA = Math.random() < 0.5;
  let pool = useA ? TYPE_A : TYPE_B;
  let used = useA ? state.usedA : state.usedB;
  if(used.length >= pool.length) used.length = 0;
  let idx;
  do { idx = Math.floor(Math.random()*pool.length); } while(used.includes(idx));
  used.push(idx);
  return {type: useA?'A':'B', q: pool[idx]};
}

function askChallenge(){
  const {type, q} = pickQuestion();
  state.currentType = type;
  state.currentQ = q;
  const tag = document.getElementById('cardTag');
  tag.textContent = type==='A' ? 'TYPE A — ILLUSTRATE' : 'TYPE B — CONVERT TO Z-SCORE';
  tag.className = 'card-tag ' + (type==='A'?'tag-A':'tag-B');
  document.getElementById('cardQ').innerHTML = q.q + (type==='B' ? `<span class="formula">z = (x − μ) / σ</span>` : '');
  const optsWrap = document.getElementById('cardOpts');
  optsWrap.innerHTML='';
  q.opts.forEach((optText,i)=>{
    const b = document.createElement('button');
    b.className='opt';
    b.textContent = (type==='B' ? `z = ${optText}` : optText);
    b.onclick = ()=> answer(i);
    optsWrap.appendChild(b);
  });
  document.getElementById('feedback').className='feedback';
  document.getElementById('continueBtn').style.display='none';
  document.getElementById('overlay').classList.add('show');
}

function escapeHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;');}

function answer(i){
  const q = state.currentQ;
  const opts = document.querySelectorAll('.opt');
  opts.forEach((b,idx)=>{
    b.disabled = true;
    if(idx===q.correct) b.classList.add('correct');
    else if(idx===i && i!==q.correct) b.classList.add('wrong');
  });
  const correct = (i===q.correct);
  const fb = document.getElementById('feedback');
  const fbTitle = document.getElementById('fbTitle');
  const fbBody = document.getElementById('fbBody');
  fbTitle.textContent = correct ? '✔ Tama!' : '✘ Mali.';
  fbTitle.className = 'fb-title ' + (correct?'ok':'no');
  fbBody.innerHTML = q.exp;
  fb.classList.add('show');
  document.getElementById('continueBtn').style.display='block';
  document.getElementById('continueBtn').onclick = ()=> resolveOutcome(correct);
}

function resolveOutcome(correct){
  document.getElementById('overlay').classList.remove('show');

  if(state.mode==='attack'){
    if(correct){
      const target = state.ai.find(p=>p.key===state.targetKey);
      target.hp -= 1;
      state.playerKP += 1;
      setStatus(`💥 Tama! Na-damage mo ang ${target.icon} ${target.name} ng AI.`);
    } else {
      setStatus(`❌ Mali ang sagot — nabigo ang atake mo. Turn ng AI ngayon.`);
    }
  } else if(state.mode==='study'){
    if(correct){
      state.playerKP += 1;
      setStatus(`📖 Tama sa Study Round! +1 Knowledge Point, walang panganib.`);
    } else {
      setStatus(`📖 Mali sa Study Round, pero walang parusa. Turn ng AI ngayon.`);
    }
  }

  renderAll(false);
  if(checkGameOver()) return;

  // proceed to AI turn after short delay
  setTimeout(aiTurn, 900);
}

/* ---------------- AI TURN ---------------- */
function aiTurn(){
  if(state.ended) return;
  const alive = state.player.filter(p=>p.hp>0);
  if(alive.length===0){ checkGameOver(); return; }
  const target = alive[Math.floor(Math.random()*alive.length)];
  setStatus(`🤖 Inaatake ng AI ang iyong ${target.icon} ${target.name}! Ipagtanggol mo — sagutan ang tanong.`);
  state.targetKey = target.key;
  state.mode = 'defend';
  askChallenge();
  // override resolveOutcome behavior for defend handled below via mode check
}

// extend resolveOutcome for defend
const origResolve = resolveOutcome;
resolveOutcome = function(correct){
  document.getElementById('overlay').classList.remove('show');
  if(state.mode==='defend'){
    if(correct){
      state.playerKP += 0; // defense doesn't grant KP, just survival
      setStatus(`🛡️ Successfully defended! Walang natamaang part.`);
    } else {
      const target = state.player.find(p=>p.key===state.targetKey);
      target.hp -= 1;
      state.aiKP += 1;
      setStatus(`💥 Hindi na-block ang atake — na-damage ang iyong ${target.icon} ${target.name}.`);
    }
    renderAll(false);
    if(checkGameOver()) return;
    document.getElementById('statusLine').textContent += " Ikaw ulit ang gagalaw.";
    return;
  }
  origResolve(correct);
};

/* ---------------- GAME OVER CHECK ---------------- */
function checkGameOver(){
  const aiDead = state.ai.every(p=>p.hp<=0);
  const playerDead = state.player.every(p=>p.hp<=0);
  const aiWinKP = state.aiKP >= 10;
  const playerWinKP = state.playerKP >= 10;

  if(aiDead || playerWinKP){
    endGame(true, aiDead ? "Nasira mo ang lahat ng 5 lab parts ng AI!" : "Naabot mo ang 10 Knowledge Points!");
    return true;
  }
  if(playerDead || aiWinKP){
    endGame(false, playerDead ? "Nasira ng AI ang lahat ng lab parts mo." : "Naunang naka-10 Knowledge Points ang AI.");
    return true;
  }
  return false;
}

function endGame(won, reason){
  state.ended = true;
  document.getElementById('goTitle').textContent = won ? "🎉 PANALO!" : "💀 TALO";
  document.getElementById('goSub').textContent = reason;
  document.getElementById('gameover').classList.add('show');
}

/* ---------------- INIT ---------------- */
renderAll(false);
</script>
