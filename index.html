<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MonoMath — Gross Income, Deductions &amp; Net Pay</title>
<style>
  :root{
    --paper:#F4EEDD;
    --ink:#1B4332;
    --ink-deep:#0F2A1E;
    --gold:#D4A017;
    --gold-light:#F0C64A;
    --rent-red:#B4402A;
    --panel:#FFFDF6;
    --line:#C9BC9C;
    --brown:#955436; --brown-t:#fff;
    --lblue:#9FD8E8; --lblue-t:#0F2A1E;
    --pink:#D93A8C; --pink-t:#fff;
    --orange:#F0871E; --orange-t:#fff;
    --red:#D6262E; --red-t:#fff;
    --yellow:#F2D63B; --yellow-t:#0F2A1E;
    --green:#1FA24E; --green-t:#fff;
    --blue:#1466A6; --blue-t:#fff;
    --util:#6B6B6B;
    --office:#3C3C3C;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;background:var(--paper);font-family:'Segoe UI',system-ui,-apple-system,sans-serif;color:var(--ink-deep);}
  h1,h2,h3,.display{font-family:Georgia,'Times New Roman',serif;font-weight:800;}
  button{font-family:inherit;cursor:pointer;}
  .app{width:100%;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:14px;}

  /* ---------- SETUP SCREEN ---------- */
  .setup-wrap{max-width:640px;width:100%;background:var(--panel);border:3px solid var(--ink);border-radius:16px;padding:28px 26px;box-shadow:0 10px 0 var(--ink);}
  .setup-wrap h1{font-size:2.1em;color:var(--ink);margin:0 0 2px;letter-spacing:.5px;}
  .setup-wrap .sub{color:#5b6b5f;margin-bottom:18px;font-size:.95em;}
  .field{margin-bottom:16px;}
  .field label{display:block;font-weight:700;font-size:.85em;color:var(--ink);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px;}
  .count-row{display:flex;gap:8px;}
  .count-btn{flex:1;padding:10px;border:2px solid var(--ink);border-radius:8px;background:var(--paper);font-weight:700;}
  .count-btn.active{background:var(--gold);border-color:var(--gold);color:var(--ink-deep);}
  .player-card{border:2px solid var(--line);border-radius:10px;padding:10px 12px;margin-bottom:8px;display:flex;gap:10px;align-items:center;background:#fff;}
  .player-card input[type=text]{flex:1;border:none;border-bottom:2px solid var(--line);padding:6px 2px;font-size:1em;background:transparent;}
  .avatar-pick{display:flex;gap:2px;}
  .avatar-btn{font-size:1.3em;padding:4px 6px;border-radius:6px;border:2px solid transparent;background:transparent;}
  .avatar-btn.sel{border-color:var(--gold);background:#FFF4D6;}
  .start-btn{width:100%;margin-top:8px;padding:14px;font-size:1.15em;font-weight:800;background:var(--ink);color:var(--gold-light);border:none;border-radius:10px;letter-spacing:.03em;}
  .start-btn:hover{background:var(--ink-deep);}
  .learn-box{background:#EEE9D6;border-left:4px solid var(--gold);padding:10px 14px;border-radius:6px;font-size:.85em;margin-bottom:16px;color:#4a4232;}

  /* ---------- GAME SCREEN ---------- */
  .game-wrap{display:none;width:100%;max-width:1300px;gap:16px;}
  .game-wrap.show{display:flex;flex-wrap:wrap;justify-content:center;}
  .board-col{flex:0 0 auto;}
  .board{
    display:grid;
    grid-template-columns:repeat(11,minmax(44px,64px));
    grid-template-rows:repeat(11,minmax(44px,64px));
    border:4px solid var(--ink-deep);border-radius:10px;
    background:#EDE3C4;position:relative;
  }
  .tile{border:1px solid #b9ac86;font-size:.55em;display:flex;flex-direction:column;justify-content:flex-end;align-items:center;position:relative;padding:2px 1px;overflow:hidden;background:#fbf7ea;text-align:center;line-height:1.05;}
  .tile .band{height:14px;width:100%;position:absolute;top:0;left:0;}
  .tile .name{margin-top:15px;font-weight:700;font-size:.95em;}
  .tile .price{color:#5b6b5f;font-size:.85em;}
  .corner{display:flex;align-items:center;justify-content:center;font-size:.72em;font-weight:800;text-align:center;background:#fbf7ea;}
  .tile.owned::after{content:'';position:absolute;inset:0;box-shadow:inset 0 0 0 3px var(--owner-color,transparent);pointer-events:none;}
  .houses{position:absolute;bottom:2px;display:flex;gap:1px;}
  .house-ico{width:6px;height:6px;background:#2ecc40;border-radius:1px;}
  .hotel-ico{width:10px;height:8px;background:#c0392b;border-radius:1px;}
  .center{
    grid-column:2/11;grid-row:2/11;
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;
    background:radial-gradient(circle at 30% 20%,#fffef2,#EDE3C4 75%);
  }
  .center h1{color:var(--ink);font-size:1.8em;margin:0;transform:rotate(-8deg);letter-spacing:1px;}
  .center .tag{font-size:.8em;color:#5b6b5f;transform:rotate(-8deg);}
  .token{position:absolute;width:16px;height:16px;border-radius:50%;border:2px solid #fff;box-shadow:0 1px 3px rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;font-size:10px;transition:all .35s ease;z-index:5;}

  /* side panel */
  .panel-col{flex:1 1 320px;min-width:300px;max-width:380px;display:flex;flex-direction:column;gap:12px;}
  .card{background:var(--panel);border:2px solid var(--ink);border-radius:12px;padding:12px 14px;}
  .players-list{display:flex;flex-direction:column;gap:8px;}
  .p-row{display:flex;align-items:center;gap:8px;padding:8px;border-radius:8px;border:2px solid transparent;}
  .p-row.current{border-color:var(--gold);background:#FFF6DC;}
  .p-row .dot{width:14px;height:14px;border-radius:50%;flex:0 0 auto;}
  .p-row .nm{font-weight:700;flex:1;font-size:.9em;}
  .p-row .cash{font-weight:800;color:var(--ink);font-size:.9em;}
  .p-row.bankrupt{opacity:.4;text-decoration:line-through;}
  .dice-area{display:flex;flex-direction:column;align-items:center;gap:10px;}
  .dice-pair{display:flex;gap:10px;}
  .die{width:46px;height:46px;background:#fff;border:2px solid var(--ink-deep);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.4em;font-weight:800;transition:transform .15s;}
  .die.rolling{animation:spin .12s infinite;}
  @keyframes spin{0%{transform:rotate(0)}100%{transform:rotate(15deg)}}
  .actions{display:flex;flex-wrap:wrap;gap:6px;}
  .actions button{flex:1 1 30%;padding:9px 4px;border:2px solid var(--ink);border-radius:8px;background:var(--paper);font-weight:700;font-size:.78em;}
  .actions button:disabled{opacity:.35;cursor:not-allowed;}
  .actions button.primary{background:var(--ink);color:var(--gold-light);}
  .actions button.danger{border-color:var(--rent-red);color:var(--rent-red);}
  .log{height:150px;overflow-y:auto;font-size:.78em;background:#fff;border:1px solid var(--line);border-radius:8px;padding:8px;display:flex;flex-direction:column-reverse;gap:3px;}
  .log div{border-bottom:1px dashed #eee;padding-bottom:2px;}

  /* modal */
  .overlay{position:fixed;inset:0;background:rgba(15,42,30,.55);display:none;align-items:center;justify-content:center;z-index:50;padding:16px;}
  .overlay.show{display:flex;}
  .modal{background:var(--panel);border-radius:16px;border:3px solid var(--ink);max-width:440px;width:100%;padding:20px 22px;box-shadow:0 10px 0 var(--ink-deep);}
  .modal h2{margin:0 0 6px;color:var(--ink);font-size:1.3em;}
  .modal p{font-size:.92em;line-height:1.4;}
  .modal .row{display:flex;gap:8px;margin-top:14px;}
  .modal button{flex:1;padding:11px;border-radius:8px;border:2px solid var(--ink);font-weight:800;background:var(--paper);}
  .modal button.yes{background:var(--ink);color:var(--gold-light);}
  .modal input[type=number], .modal input[type=text]{width:100%;padding:10px;font-size:1.05em;border:2px solid var(--line);border-radius:8px;margin-top:8px;}
  .badge{display:inline-block;padding:2px 10px;border-radius:20px;font-size:.7em;font-weight:800;color:#fff;margin-bottom:6px;}
  .flash{position:fixed;top:14px;left:50%;transform:translateX(-50%);background:var(--ink);color:var(--gold-light);padding:9px 18px;border-radius:20px;font-weight:700;font-size:.85em;z-index:60;display:none;}

  .prop-groups{display:flex;flex-wrap:wrap;gap:4px;margin:8px 0;}
  .grp-chip{padding:3px 8px;border-radius:6px;font-size:.7em;font-weight:700;color:#fff;}

  @media(max-width:760px){
    .board{grid-template-columns:repeat(11,minmax(26px,32px));grid-template-rows:repeat(11,minmax(26px,32px));}
    .tile{font-size:.42em;}
    .center h1{font-size:1em;}
  }
</style>
</head>
<body>
<div class="flash" id="flash"></div>

<div class="app">

  <!-- SETUP SCREEN -->
  <div class="setup-wrap" id="setupScreen">
    <h1>🎲 MonoMath</h1>
    <div class="sub">Gross Income · Net Pay · Deductions — General Mathematics, Grade 11</div>
    <div class="learn-box">📚 <strong>Learning goal:</strong> practice computing gross income, mandatory/voluntary deductions, and net pay while building landmarks and collecting rent across Philippine cities.</div>

    <div class="field">
      <label>Number of players</label>
      <div class="count-row" id="countRow"></div>
    </div>

    <div class="field">
      <label>Players</label>
      <div id="playerCards"></div>
    </div>

    <button class="start-btn" id="startBtn">Start Game — Everyone gets ₱15,000</button>
  </div>

  <!-- GAME SCREEN -->
  <div class="game-wrap" id="gameScreen">
    <div class="board-col">
      <div class="board" id="board"></div>
    </div>
    <div class="panel-col">
      <div class="card">
        <h3 style="margin:0 0 8px;color:var(--ink);">Players</h3>
        <div class="players-list" id="playersList"></div>
      </div>
      <div class="card dice-area">
        <div class="dice-pair"><div class="die" id="die1">–</div><div class="die" id="die2">–</div></div>
        <div style="font-size:.8em;color:#5b6b5f;" id="turnLabel">—</div>
        <div class="actions" style="width:100%;">
          <button class="primary" id="rollBtn">🎲 Roll Dice</button>
          <button id="buyBtn" disabled>🏠 Buy</button>
          <button id="skipBuyBtn" disabled>❌ Decline</button>
          <button id="buildBtn" disabled>🏗️ Build</button>
          <button id="mortgageBtn" disabled>🏦 Mortgage</button>
          <button id="redeemBtn" disabled>💵 Redeem</button>
          <button class="danger" id="bailBtn" disabled>🔓 Pay Bail (₱500)</button>
          <button class="primary" id="endTurnBtn" disabled>➡️ End Turn</button>
        </div>
      </div>
      <div class="card">
        <h3 style="margin:0 0 8px;color:var(--ink);">Game Log</h3>
        <div class="log" id="log"></div>
      </div>
    </div>
  </div>
</div>

<!-- generic modal -->
<div class="overlay" id="overlay">
  <div class="modal" id="modalBody"></div>
</div>

<script>
/* ===================== DATA ===================== */
const AVATARS = ["👩‍🏫","👨‍⚕️","👷","💼","👩‍⚕️","👮","🧮"];
const GROUP_COLORS = {brown:"var(--brown)",lblue:"var(--lblue)",pink:"var(--pink)",orange:"var(--orange)",red:"var(--red)",yellow:"var(--yellow)",green:"var(--green)",blue:"var(--blue)"};
const GROUP_TEXT = {brown:"var(--brown-t)",lblue:"var(--lblue-t)",pink:"var(--pink-t)",orange:"var(--orange-t)",red:"var(--red-t)",yellow:"var(--yellow-t)",green:"var(--green-t)",blue:"var(--blue-t)"};
const PLAYER_COLORS = ["#D6262E","#1466A6","#1FA24E","#8E44AD"];

function prop(name,group,price){ return {type:"property",name,group,price,rentBase:Math.round(price/10),owner:null,houses:0,mortgaged:false}; }
function office(name){ return {type:"office",name,price:200,owner:null,mortgaged:false}; }
function util(name){ return {type:"utility",name,price:150,owner:null,mortgaged:false}; }

const BOARD = [
 {type:"go",name:"GO"},
 prop("Divisoria","brown",60),
 {type:"payroll",name:"Payroll Card"},
 prop("Baclaran","brown",60),
 {type:"tax",name:"Withholding Tax",amount:200},
 office("SSS Office"),
 prop("Quiapo","lblue",100),
 {type:"deduction",name:"Deduction Card"},
 prop("Binondo","lblue",100),
 prop("Recto","lblue",120),
 {type:"jail",name:"Jail / Visiting"},
 prop("BGC, Taguig","pink",140),
 util("Electric Co."),
 prop("Ortigas Center","pink",140),
 prop("Makati Ave.","pink",160),
 office("PhilHealth Office"),
 prop("Cubao","orange",180),
 {type:"payroll",name:"Payroll Card"},
 prop("Banawe","orange",180),
 prop("Timog Ave.","orange",200),
 {type:"parking",name:"Free Parking"},
 prop("Alabang","red",220),
 {type:"deduction",name:"Deduction Card"},
 prop("Filinvest City","red",220),
 prop("Nuvali","red",240),
 office("Pag-IBIG Office"),
 prop("Tagaytay","yellow",260),
 prop("Baguio City","yellow",260),
 util("Water Works"),
 prop("Boracay","yellow",280),
 {type:"gotojail",name:"Go To Jail"},
 prop("Cebu IT Park","green",300),
 prop("Ayala Cebu","green",300),
 {type:"payroll",name:"Payroll Card"},
 prop("Davao City","green",320),
 office("BIR Office"),
 {type:"deduction",name:"Deduction Card"},
 prop("Palawan","blue",350),
 {type:"tax",name:"Bonus Tax",amount:100},
 prop("Amanpulo","blue",400)
];

const RENT_MULT = [1,5,15,30,40,50]; // index = houses (5 = hotel)

const PAYROLL_CARDS = [
 {text:"Year-end bonus received!", cash:1000},
 {text:"You won 'Employee of the Month'.", cash:500},
 {text:"Tax refund from BIR.", cash:300},
 {text:"Overtime pay credited.", cash:400},
 {text:"You paid for a training seminar.", cash:-300},
];
const DEDUCTION_CARDS = [
 {text:"SSS contribution deducted.", cash:-300},
 {text:"PhilHealth premium deducted.", cash:-200},
 {text:"Pag-IBIG contribution deducted.", cash:-150},
 {text:"Late penalty deducted from pay.", cash:-250},
 {text:"Union dues deducted.", cash:-100},
];

// Word problems: {q, answer, tolerance}
const QUESTIONS = [
 {q:"Ana works 8 hours/day at ₱75/hour, 5 days a week. What is her weekly GROSS income?", a:3000},
 {q:"Ben's monthly basic salary is ₱18,000. He also earned a ₱2,500 commission. What is his GROSS income for the month?", a:20500},
 {q:"Carlo earns ₱500/day and worked 22 days this month. What is his GROSS monthly income?", a:11000},
 {q:"Dina's gross pay is ₱15,000. Total deductions (SSS ₱581 + PhilHealth ₱412 + Pag-IBIG ₱100 + Tax ₱907) total how much?", a:2000},
 {q:"Using Dina's numbers above (gross ₱15,000, deductions ₱2,000), what is her NET PAY?", a:13000},
 {q:"Emil worked 4 hours of overtime at 1.25× his ₱100/hour rate. How much is his overtime pay?", a:500},
 {q:"Fely's gross income is ₱22,000. If total deductions are 15% of gross, how much are the deductions?", a:3300},
 {q:"Using Fely's numbers, what is her NET PAY (gross ₱22,000 − deductions ₱3,300)?", a:18700},
 {q:"Gio is paid ₱12/piece and completed 250 pieces this week. What is his gross income (piecework)?", a:3000},
 {q:"Helen's SSS + PhilHealth + Pag-IBIG contributions are ₱600, ₱437.50, and ₱100. What is her total MANDATORY deduction?", a:1137.5},
 {q:"Ivan earns ₱20,000/month gross. His withholding tax is ₱1,200 and other mandatory deductions total ₱1,300. What is his NET PAY?", a:17500},
 {q:"Joy works a 40-hour week at ₱90/hour. What is her weekly gross income?", a:3600},
 {q:"Karla's daily wage is ₱610. She worked 6 days this week. What is her gross weekly income?", a:3660},
 {q:"Leo's gross pay is ₱9,500 with total deductions of ₱950 (10%). What is his net pay?", a:8550},
 {q:"Mica gets a monthly allowance of ₱1,500 plus a ₱16,000 basic salary. What is her total gross income?", a:17500},
];
let usedQuestions = [];

/* ===================== STATE ===================== */
let state = {
  players: [],
  board: JSON.parse(JSON.stringify(BOARD)),
  current: 0,
  dice:[1,1],
  doublesCount:0,
  turnPhase:"pre-roll", // pre-roll, landed, post
  lastRollWasDouble:false,
  landedTileIndex:null,
  pendingBuyIndex:null,
  gameOver:false,
};

/* ===================== SETUP SCREEN ===================== */
let numPlayers = 2;
const countRow = document.getElementById('countRow');
[2,3,4].forEach(n=>{
  const b=document.createElement('button');
  b.className='count-btn'+(n===2?' active':'');
  b.textContent=n+' Players';
  b.onclick=()=>{numPlayers=n;renderPlayerCards();[...countRow.children].forEach(c=>c.classList.remove('active'));b.classList.add('active');};
  countRow.appendChild(b);
});
function renderPlayerCards(){
  const wrap=document.getElementById('playerCards');
  const existing = wrap.querySelectorAll('.player-card');
  const prevNames = [...existing].map(c=>c.querySelector('input').value);
  wrap.innerHTML='';
  for(let i=0;i<numPlayers;i++){
    const card=document.createElement('div');
    card.className='player-card';
    card.innerHTML=`<div class="dot" style="background:${PLAYER_COLORS[i]}"></div>
      <input type="text" maxlength="14" value="${prevNames[i]||('Player '+(i+1))}" data-idx="${i}">
      <div class="avatar-pick" data-idx="${i}"></div>`;
    wrap.appendChild(card);
    const pick=card.querySelector('.avatar-pick');
    AVATARS.forEach((a,ai)=>{
      const ab=document.createElement('button');
      ab.className='avatar-btn'+(ai===i%AVATARS.length?' sel':'');
      ab.textContent=a;
      ab.type='button';
      ab.onclick=()=>{[...pick.children].forEach(c=>c.classList.remove('sel'));ab.classList.add('sel');};
      pick.appendChild(ab);
    });
  }
}
renderPlayerCards();

document.getElementById('startBtn').onclick=()=>{
  const cards=[...document.querySelectorAll('.player-card')];
  state.players = cards.map((c,i)=>{
    const name=c.querySelector('input').value.trim()||('Player '+(i+1));
    const sel=c.querySelector('.avatar-btn.sel');
    const avatar= sel?sel.textContent:AVATARS[i%AVATARS.length];
    return {name,avatar,color:PLAYER_COLORS[i],cash:15000,position:0,inJail:false,jailTurns:0,bankrupt:false};
  });
  document.getElementById('setupScreen').style.display='none';
  document.getElementById('gameScreen').classList.add('show');
  buildBoardDOM();
  renderAll();
  logMsg("🎮 Game started! Each player received ₱15,000 starting capital.");
};

/* ===================== BOARD DOM ===================== */
function gridPos(i){
  if(i===0) return {row:11,col:11};
  if(i>=1&&i<=9) return {row:11,col:11-i};
  if(i===10) return {row:11,col:1};
  if(i>=11&&i<=19) return {row:11-(i-10),col:1};
  if(i===20) return {row:1,col:1};
  if(i>=21&&i<=29) return {row:1,col:1+(i-20)};
  if(i===30) return {row:1,col:11};
  if(i>=31&&i<=39) return {row:1+(i-30),col:11};
}
function buildBoardDOM(){
  const board=document.getElementById('board');
  board.innerHTML='';
  const center=document.createElement('div');
  center.className='center';
  center.innerHTML=`<h1>MonoMath</h1><div class="tag">Gross Income · Deductions · Net Pay</div>`;
  board.appendChild(center);
  state.board.forEach((t,i)=>{
    const pos=gridPos(i);
    const el=document.createElement('div');
    el.id='tile-'+i;
    el.style.gridColumn=pos.col;el.style.gridRow=pos.row;
    if(t.type==="go"||t.type==="jail"||t.type==="parking"||t.type==="gotojail"){
      el.className='corner';
      const label = t.type==="go"?"➡️ GO":t.type==="jail"?"🔒 JAIL":t.type==="parking"?"🅿️ FREE PARKING":"👮 GO TO JAIL";
      el.innerHTML=label;
    } else if(t.type==="property"){
      el.className='tile';
      el.innerHTML=`<div class="band" style="background:${GROUP_COLORS[t.group]}"></div><div class="name">${t.name}</div><div class="price">₱${t.price}</div><div class="houses" id="houses-${i}"></div>`;
    } else if(t.type==="office"){
      el.className='tile';
      el.innerHTML=`<div class="band" style="background:var(--office)"></div><div class="name">🏢 ${t.name}</div><div class="price">₱${t.price}</div>`;
    } else if(t.type==="utility"){
      el.className='tile';
      el.innerHTML=`<div class="band" style="background:var(--util)"></div><div class="name">${t.name.includes('Elec')?'⚡':'💧'} ${t.name}</div><div class="price">₱${t.price}</div>`;
    } else if(t.type==="payroll"){
      el.className='tile';
      el.innerHTML=`<div class="name">💵 Payroll</div>`;
    } else if(t.type==="deduction"){
      el.className='tile';
      el.innerHTML=`<div class="name">🧾 Deduction</div>`;
    } else if(t.type==="tax"){
      el.className='tile';
      el.innerHTML=`<div class="name">💸 ${t.name}</div><div class="price">₱${t.amount}</div>`;
    }
    board.appendChild(el);
  });
}

/* ===================== RENDER ===================== */
function renderAll(){
  renderPlayersList();
  renderTokens();
  renderOwnership();
  updateActionButtons();
}
function renderPlayersList(){
  const wrap=document.getElementById('playersList');
  wrap.innerHTML='';
  state.players.forEach((p,i)=>{
    const row=document.createElement('div');
    row.className='p-row'+(i===state.current&&!state.gameOver?' current':'')+(p.bankrupt?' bankrupt':'');
    row.innerHTML=`<div class="dot" style="background:${p.color}"></div><div class="nm">${p.avatar} ${p.name}${p.inJail?' 🔒':''}</div><div class="cash">₱${p.cash.toLocaleString()}</div>`;
    wrap.appendChild(row);
  });
  const cur=state.players[state.current];
  document.getElementById('turnLabel').textContent = state.gameOver? "Game Over" : (cur? `${cur.avatar} ${cur.name}'s turn` : "");
}
function renderTokens(){
  document.querySelectorAll('.token').forEach(t=>t.remove());
  state.players.forEach((p,i)=>{
    if(p.bankrupt) return;
    const tileEl=document.getElementById('tile-'+p.position);
    if(!tileEl) return;
    const tok=document.createElement('div');
    tok.className='token';
    tok.style.background=p.color;
    tok.style.left=(6+i*13)+'px';
    tok.style.bottom='4px';
    tok.style.position='absolute';
    tok.textContent=p.avatar.slice(0,1);
    tileEl.style.position='relative';
    tileEl.appendChild(tok);
  });
}
function renderOwnership(){
  state.board.forEach((t,i)=>{
    const el=document.getElementById('tile-'+i);
    if(!el) return;
    el.classList.remove('owned');
    el.style.removeProperty('--owner-color');
    if((t.type==="property"||t.type==="office"||t.type==="utility") && t.owner!=null){
      el.classList.add('owned');
      el.style.setProperty('--owner-color', state.players[t.owner].color);
    }
    if(t.type==="property"){
      const h=document.getElementById('houses-'+i);
      if(h){
        h.innerHTML='';
        if(t.houses===5){ h.innerHTML='<div class="hotel-ico"></div>'; }
        else { for(let k=0;k<t.houses;k++) h.innerHTML+='<div class="house-ico"></div>'; }
      }
    }
  });
}

/* ===================== LOG / FLASH ===================== */
function logMsg(msg){
  const log=document.getElementById('log');
  const d=document.createElement('div');
  d.textContent=msg;
  log.prepend(d);
}
function flash(msg){
  const f=document.getElementById('flash');
  f.textContent=msg;f.style.display='block';
  clearTimeout(f._t);
  f._t=setTimeout(()=>f.style.display='none',2200);
}

/* ===================== MODAL HELPERS ===================== */
function showModal(html){
  document.getElementById('modalBody').innerHTML=html;
  document.getElementById('overlay').classList.add('show');
}
function hideModal(){ document.getElementById('overlay').classList.remove('show'); }

/* ===================== CORE GAME LOGIC ===================== */
function curPlayer(){ return state.players[state.current]; }

document.getElementById('rollBtn').onclick=rollDice;
document.getElementById('buyBtn').onclick=()=>resolveBuy(true);
document.getElementById('skipBuyBtn').onclick=()=>resolveBuy(false);
document.getElementById('buildBtn').onclick=openBuildModal;
document.getElementById('mortgageBtn').onclick=openMortgageModal;
document.getElementById('redeemBtn').onclick=openRedeemModal;
document.getElementById('bailBtn').onclick=payBail;
document.getElementById('endTurnBtn').onclick=endTurn;

function updateActionButtons(){
  const p=curPlayer();
  const rollBtn=document.getElementById('rollBtn');
  const buyBtn=document.getElementById('buyBtn');
  const skipBtn=document.getElementById('skipBuyBtn');
  const buildBtn=document.getElementById('buildBtn');
  const mortBtn=document.getElementById('mortgageBtn');
  const redeemBtn=document.getElementById('redeemBtn');
  const bailBtn=document.getElementById('bailBtn');
  const endBtn=document.getElementById('endTurnBtn');
  if(state.gameOver||!p){ [rollBtn,buyBtn,skipBtn,buildBtn,mortBtn,redeemBtn,bailBtn,endBtn].forEach(b=>b.disabled=true); return; }

  rollBtn.disabled = state.turnPhase!=="pre-roll" || p.inJail;
  bailBtn.disabled = !p.inJail || state.turnPhase!=="pre-roll";
  buyBtn.disabled = state.turnPhase!=="landed" || state.pendingBuyIndex===null;
  skipBtn.disabled = buyBtn.disabled;
  endBtn.disabled = state.turnPhase!=="post" && !(state.turnPhase==="pre-roll" && p.inJail);
  buildBtn.disabled = state.turnPhase==="pre-roll" ? false : false; // always allowed on your turn except mid-resolution
  if(state.turnPhase==="landed") { buildBtn.disabled=true; mortBtn.disabled=true; redeemBtn.disabled=true; }
  else { mortBtn.disabled=false; redeemBtn.disabled=false; }
}

function rollDice(){
  const p=curPlayer();
  if(p.inJail){ return; }
  let rolls=0;
  const d1el=document.getElementById('die1'), d2el=document.getElementById('die2');
  d1el.classList.add('rolling');d2el.classList.add('rolling');
  const iv=setInterval(()=>{
    d1el.textContent=1+Math.floor(Math.random()*6);
    d2el.textContent=1+Math.floor(Math.random()*6);
    rolls++;
    if(rolls>6){
      clearInterval(iv);
      d1el.classList.remove('rolling');d2el.classList.remove('rolling');
      const a=1+Math.floor(Math.random()*6), b=1+Math.floor(Math.random()*6);
      d1el.textContent=a; d2el.textContent=b;
      state.dice=[a,b];
      handleRollResult(a,b);
    }
  },90);
}

function handleRollResult(a,b){
  const p=curPlayer();
  const isDouble = a===b;
  logMsg(`${p.avatar} ${p.name} rolled ${a} + ${b}${isDouble?' (double!)':''}`);
  if(isDouble){
    state.doublesCount++;
    if(state.doublesCount>=3){
      logMsg(`🚨 Three doubles in a row! ${p.name} is sent to Jail.`);
      sendToJail(p);
      state.turnPhase="post";
      renderAll();
      return;
    }
  } else {
    state.doublesCount=0;
  }
  movePlayer(p,a+b, isDouble);
}

function movePlayer(p,steps,isDouble){
  const startPos=p.position;
  let newPos=(startPos+steps)%40;
  const passedGo = newPos < startPos;
  p.position=newPos;
  renderTokens();
  if(passedGo){
    triggerGoSalary(p, ()=>{ landOnTile(p,isDouble); });
  } else {
    landOnTile(p,isDouble);
  }
}

function triggerGoSalary(p, cb){
  usedQuestions = usedQuestions.length>=QUESTIONS.length-1 ? [] : usedQuestions;
  let pool = QUESTIONS.map((q,i)=>i).filter(i=>!usedQuestions.includes(i));
  const qi = pool[Math.floor(Math.random()*pool.length)];
  usedQuestions.push(qi);
  const q = QUESTIONS[qi];
  showModal(`
    <span class="badge" style="background:var(--gold);color:#3a2c00;">PASSED GO</span>
    <h2>💵 Payroll Challenge</h2>
    <p>Solve correctly to receive your ₱2,000 GO salary!</p>
    <p style="font-weight:700;">${q.q}</p>
    <input type="number" step="any" id="answerInput" placeholder="Your answer (₱)">
    <div class="row"><button class="yes" id="submitAnswer">Submit Answer</button></div>
  `);
  document.getElementById('submitAnswer').onclick=()=>{
    const val=parseFloat(document.getElementById('answerInput').value);
    const correct = !isNaN(val) && Math.abs(val - q.a) < 0.5;
    if(correct){
      p.cash += 2000;
      logMsg(`✅ ${p.name} solved the payroll problem correctly and earned ₱2,000!`);
      flash("Correct! +₱2,000 salary 🎉");
    } else {
      logMsg(`❌ ${p.name} answered incorrectly (correct: ₱${q.a.toLocaleString()}) and received no salary.`);
      flash(`Incorrect — answer was ₱${q.a.toLocaleString()}`);
    }
    hideModal();
    renderAll();
    cb();
  };
}

function landOnTile(p, isDouble){
  const i=p.position;
  const t=state.board[i];
  state.landedTileIndex=i;
  logMsg(`${p.avatar} ${p.name} landed on ${t.name}.`);

  if(t.type==="go"){ state.turnPhase="post"; }
  else if(t.type==="property"||t.type==="office"||t.type==="utility"){
    if(t.owner===null){
      state.pendingBuyIndex=i;
      state.turnPhase="landed";
    } else if(t.owner===state.current){
      state.turnPhase="post";
    } else if(t.mortgaged){
      logMsg(`(Mortgaged — no rent owed.)`);
      state.turnPhase="post";
    } else {
      payRentFor(p,i);
      state.turnPhase="post";
    }
  }
  else if(t.type==="payroll"){ drawCard(PAYROLL_CARDS,p,"💵 Payroll Card"); state.turnPhase="post"; }
  else if(t.type==="deduction"){ drawCard(DEDUCTION_CARDS,p,"🧾 Deduction Card"); state.turnPhase="post"; }
  else if(t.type==="tax"){ p.cash -= t.amount; logMsg(`${p.name} paid ₱${t.amount} in ${t.name}.`); flash(`Paid ₱${t.amount} tax`); state.turnPhase="post"; checkBankruptcy(p); }
  else if(t.type==="jail"){ state.turnPhase="post"; }
  else if(t.type==="parking"){ logMsg("Free Parking — nothing happens (house rule: no jackpot)."); state.turnPhase="post"; }
  else if(t.type==="gotojail"){ sendToJail(p); state.turnPhase="post"; }

  // doubles => roll again unless jailed
  if(isDouble && !p.inJail && t.type!=="gotojail" && state.turnPhase==="post"){
    logMsg(`🎲 Doubles! ${p.name} gets to roll again.`);
    state.turnPhase="pre-roll";
  }
  renderAll();
}

function drawCard(deck,p,label){
  const c=deck[Math.floor(Math.random()*deck.length)];
  p.cash += c.cash;
  logMsg(`${label}: "${c.text}" (${c.cash>=0?'+':''}₱${c.cash})`);
  flash(c.text);
  checkBankruptcy(p);
}

function payRentFor(p,i){
  const t=state.board[i];
  const owner=state.players[t.owner];
  let rent=0;
  if(t.type==="property"){
    if(t.houses>0){ rent = t.rentBase*RENT_MULT[t.houses]; }
    else {
      const groupTiles = state.board.filter(x=>x.type==="property"&&x.group===t.group);
      const ownsAll = groupTiles.every(x=>x.owner===t.owner);
      rent = t.rentBase * (ownsAll?2:1);
    }
  } else if(t.type==="office"){
    const owned = state.board.filter(x=>x.type==="office"&&x.owner===t.owner).length;
    rent = 25*Math.pow(2,owned-1);
  } else if(t.type==="utility"){
    const owned = state.board.filter(x=>x.type==="utility"&&x.owner===t.owner).length;
    rent = (state.dice[0]+state.dice[1]) * (owned>=2?10:4);
  }
  p.cash -= rent;
  owner.cash += rent;
  logMsg(`${p.name} paid ₱${rent} rent to ${owner.name}.`);
  flash(`Paid ₱${rent} rent`);
  checkBankruptcy(p);
}

function resolveBuy(buy){
  const p=curPlayer();
  const i=state.pendingBuyIndex;
  const t=state.board[i];
  if(buy){
    if(p.cash>=t.price){
      p.cash -= t.price;
      t.owner = state.current;
      logMsg(`🏠 ${p.name} bought ${t.name} for ₱${t.price}.`);
      flash(`Bought ${t.name}!`);
    } else {
      flash("Not enough cash!");
      return;
    }
  } else {
    logMsg(`${p.name} declined to buy ${t.name}. (Auction skipped in this prototype — property stays unowned.)`);
  }
  state.pendingBuyIndex=null;
  state.turnPhase="post";
  renderAll();
}

function sendToJail(p){
  p.inJail=true; p.jailTurns=0; p.position=10;
  renderTokens();
  logMsg(`🔒 ${p.name} is sent to Jail.`);
}
function payBail(){
  const p=curPlayer();
  if(p.cash<500){ flash("Not enough cash for bail!"); return; }
  p.cash-=500; p.inJail=false; p.jailTurns=0;
  logMsg(`${p.name} paid ₱500 bail and is free.`);
  renderAll();
}

function endTurn(){
  const p=curPlayer();
  if(p.inJail && state.turnPhase==="pre-roll"){
    // attempted to just pass turn while in jail (didn't roll)
    p.jailTurns++;
    logMsg(`${p.name} stays in jail (attempt ${p.jailTurns}/3).`);
    if(p.jailTurns>=3){ p.inJail=false; p.jailTurns=0; logMsg(`${p.name} is released after 3 turns.`); }
  }
  nextPlayer();
}

function nextPlayer(){
  state.doublesCount=0;
  state.turnPhase="pre-roll";
  document.getElementById('die1').textContent='–';
  document.getElementById('die2').textContent='–';
  let tries=0;
  do{
    state.current=(state.current+1)%state.players.length;
    tries++;
  } while(state.players[state.current].bankrupt && tries<=state.players.length);
  checkWin();
  renderAll();
}

// jail dice-roll escape: intercept rollDice for jailed players via a special path
const originalRollDice = rollDice;
document.getElementById('rollBtn').onclick=()=>{
  const p=curPlayer();
  if(p.inJail){
    rollForJailEscape();
  } else {
    rollDice();
  }
};
function rollForJailEscape(){
  const p=curPlayer();
  const a=1+Math.floor(Math.random()*6), b=1+Math.floor(Math.random()*6);
  document.getElementById('die1').textContent=a;
  document.getElementById('die2').textContent=b;
  if(a===b){
    p.inJail=false; p.jailTurns=0;
    logMsg(`🎲 ${p.name} rolled doubles (${a},${b}) and escaped Jail!`);
    movePlayer(p,a+b,false);
  } else {
    p.jailTurns++;
    logMsg(`${p.name} rolled ${a},${b} — no doubles. Still in jail (attempt ${p.jailTurns}/3).`);
    if(p.jailTurns>=3){
      p.inJail=false; p.jailTurns=0;
      logMsg(`${p.name} is released after 3 failed attempts.`);
    }
    state.turnPhase="post";
    renderAll();
  }
}

/* ===================== BUILD / MORTGAGE ===================== */
function openBuildModal(){
  const p=curPlayer();
  const myProps = state.board.map((t,i)=>({t,i})).filter(o=>o.t.type==="property"&&o.t.owner===state.current);
  const groups = {};
  myProps.forEach(o=>{ (groups[o.t.group]=groups[o.t.group]||[]).push(o); });
  let rows='';
  Object.keys(groups).forEach(g=>{
    const all = state.board.filter(t=>t.type==="property"&&t.group===g);
    const ownsAll = all.every(t=>t.owner===state.current);
    groups[g].forEach(o=>{
      const t=o.t;
      const minInGroup = Math.min(...all.map(x=>x.houses));
      const canBuild = ownsAll && t.houses<5 && t.houses===minInGroup && p.cash>=100;
      rows += `<div style="display:flex;justify-content:space-between;align-items:center;margin:6px 0;padding:6px;border:1px solid var(--line);border-radius:6px;">
        <span>${t.name} <span class="grp-chip" style="background:${GROUP_COLORS[g]};color:${GROUP_TEXT[g]}">${t.houses===5?'HOTEL':t.houses+' 🏠'}</span></span>
        <button ${canBuild?'':'disabled'} data-i="${o.i}" class="buildOneBtn" style="padding:6px 10px;border-radius:6px;border:2px solid var(--ink);background:${canBuild?'var(--gold)':'#eee'};font-weight:700;">+ ₱100</button>
      </div>`;
    });
  });
  if(!rows) rows = "<p>You need a complete color group before you can build. Own every property of one color to unlock building.</p>";
  showModal(`<h2>🏗️ Build Houses / Hotels</h2><p style="font-size:.8em;color:#5b6b5f;">Houses must be built evenly across a color group. ₱100 per house. 4 houses upgrade to a hotel.</p>${rows}<div class="row"><button id="closeBuild">Close</button></div>`);
  document.querySelectorAll('.buildOneBtn').forEach(b=>{
    b.onclick=()=>{
      const i=parseInt(b.dataset.i);
      const t=state.board[i];
      p.cash-=100; t.houses++;
      logMsg(`🏗️ ${p.name} built ${t.houses===5?'a HOTEL':'a house'} on ${t.name}.`);
      hideModal(); renderAll(); openBuildModal();
    };
  });
  document.getElementById('closeBuild').onclick=hideModal;
}

function openMortgageModal(){
  const p=curPlayer();
  const myProps = state.board.map((t,i)=>({t,i})).filter(o=>[ "property","office","utility"].includes(o.t.type)&&o.t.owner===state.current&&!o.t.mortgaged&&o.t.houses===0);
  let rows = myProps.map(o=>`<div style="display:flex;justify-content:space-between;align-items:center;margin:6px 0;">
    <span>${o.t.name}</span><button data-i="${o.i}" class="mortOneBtn" style="padding:6px 10px;border-radius:6px;border:2px solid var(--ink);background:var(--paper);font-weight:700;">Mortgage +₱${Math.round(o.t.price/2)}</button></div>`).join('');
  if(!rows) rows="<p>No eligible (unmortgaged, house-free) properties to mortgage.</p>";
  showModal(`<h2>🏦 Mortgage Property</h2>${rows}<div class="row"><button id="closeM">Close</button></div>`);
  document.querySelectorAll('.mortOneBtn').forEach(b=>{
    b.onclick=()=>{
      const i=parseInt(b.dataset.i); const t=state.board[i];
      t.mortgaged=true; p.cash += Math.round(t.price/2);
      logMsg(`🏦 ${p.name} mortgaged ${t.name} for ₱${Math.round(t.price/2)}.`);
      hideModal(); renderAll(); openMortgageModal();
    };
  });
  document.getElementById('closeM').onclick=hideModal;
}
function openRedeemModal(){
  const p=curPlayer();
  const myProps = state.board.map((t,i)=>({t,i})).filter(o=>[ "property","office","utility"].includes(o.t.type)&&o.t.owner===state.current&&o.t.mortgaged);
  let rows = myProps.map(o=>{
    const cost=Math.round(o.t.price/2*1.1);
    return `<div style="display:flex;justify-content:space-between;align-items:center;margin:6px 0;">
    <span>${o.t.name}</span><button data-i="${o.i}" class="redeemOneBtn" ${p.cash<cost?'disabled':''} style="padding:6px 10px;border-radius:6px;border:2px solid var(--ink);background:var(--paper);font-weight:700;">Redeem ₱${cost}</button></div>`;
  }).join('');
  if(!rows) rows="<p>No mortgaged properties to redeem.</p>";
  showModal(`<h2>💵 Redeem Mortgage</h2>${rows}<div class="row"><button id="closeR">Close</button></div>`);
  document.querySelectorAll('.redeemOneBtn').forEach(b=>{
    b.onclick=()=>{
      const i=parseInt(b.dataset.i); const t=state.board[i];
      const cost=Math.round(t.price/2*1.1);
      t.mortgaged=false; p.cash-=cost;
      logMsg(`💵 ${p.name} redeemed ${t.name} for ₱${cost}.`);
      hideModal(); renderAll(); openRedeemModal();
    };
  });
  document.getElementById('closeR').onclick=hideModal;
}

/* ===================== BANKRUPTCY / WIN ===================== */
function checkBankruptcy(p){
  if(p.cash<0 && !p.bankrupt){
    p.bankrupt=true;
    // release properties
    state.board.forEach(t=>{ if((t.type==="property"||t.type==="office"||t.type==="utility") && t.owner===state.players.indexOf(p)){ t.owner=null; t.houses=0; t.mortgaged=false; }});
    logMsg(`💥 ${p.name} has gone BANKRUPT and is out of the game!`);
    flash(`${p.name} is bankrupt!`);
  }
}
function checkWin(){
  const alive = state.players.filter(p=>!p.bankrupt);
  if(alive.length===1 && state.players.length>1){
    state.gameOver=true;
    logMsg(`🏆 ${alive[0].name} wins the game as the last player standing!`);
    flash(`🏆 ${alive[0].name} WINS!`);
  }
}
